doctrine:
    dbal:
        default_connection: default
        connections:
            # Primary product database (MySQL). Used by App\Repository\ArticleRepository
            # and the ORM entity manager. Left as-is.
            default:
                url: '%env(resolve:DATABASE_URL)%'

                # IMPORTANT: You MUST configure your server version,
                # either here or in the DATABASE_URL env var (see .env file)
                #server_version: '16'

                profiling_collect_backtrace: '%kernel.debug%'

            # Read-only SQLite database of Thomann guides & Learn articles,
            # populated by bin/crawl_thomann_guides.py and bin/crawl_thomann_learn.py.
            # Isolated from the product connection above so it cannot interfere with it.
            guides:
                url: '%env(resolve:GUIDES_DATABASE_URL)%'
                profiling_collect_backtrace: '%kernel.debug%'
    orm:
        # Single entity manager, implicitly bound to dbal.default_connection.
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@test:
    doctrine:
        dbal:
            connections:
                default:
                    # "TEST_TOKEN" is typically set by ParaTest.
                    # Only the product connection is isolated per test run; the
                    # read-only SQLite guides file is shared as-is.
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
